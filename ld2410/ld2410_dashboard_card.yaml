# =================================================================
# 📡 CARTE DASHBOARD LD2410 PRO EDITION (Version v2.11 - Mirror Pro)
# Fichier : ld2410_dashboard_card.yaml
# Synchronisation calquée sur le moteur ultra-réactif du LD2450
# =================================================================

type: vertical-stack
cards:
  # =================================================================
  # 1. ÉTAT DE PRÉSENCE & SÉLECTEUR
  # =================================================================
  - type: custom:config-template-card
    entities:
      - input_select.liste_esp_ld2410
      - >-
        ${ states['input_select.liste_esp_ld2410'] ? 'binary_sensor.' + states['input_select.liste_esp_ld2410'].state + '_presence' : 'sun.sun' }
    variables:
      esp: >-
        states['input_select.liste_esp_ld2410'] ? states['input_select.liste_esp_ld2410'].state : 'esp_salon'
    card:
      type: vertical-stack
      cards:
        - type: custom:mushroom-select-card
          entity: input_select.liste_esp_ld2410
          name: "Capteur LD2410 Actif"
          icon: mdi:radar
          layout: horizontal
        - type: custom:mushroom-entity-card
          entity: "${ 'binary_sensor.' + esp + '_presence' }"
          name: "Présence Détectée"
          icon: mdi:home-account
          icon_color: >-
            ${ states['binary_sensor.' + esp + '_presence']?.state === 'on' ? '#2E8B57' : 'disabled' }
          layout: horizontal
          secondary_info: last-changed

  # =================================================================
  # 2. ANALYSE TEMPS RÉEL
  # =================================================================
  - type: custom:config-template-card
    entities:
      - input_select.liste_esp_ld2410
      - >-
        ${ states['input_select.liste_esp_ld2410'] ? 'binary_sensor.' + states['input_select.liste_esp_ld2410'].state + '_movement' : 'sun.sun' }
      - >-
        ${ states['input_select.liste_esp_ld2410'] ? 'binary_sensor.' + states['input_select.liste_esp_ld2410'].state + '_still' : 'sun.sun' }
    variables:
      esp: >-
        states['input_select.liste_esp_ld2410'] ? states['input_select.liste_esp_ld2410'].state : 'esp_salon'
    card:
      type: grid
      columns: 2
      square: false
      cards:
        - type: custom:mushroom-entity-card
          entity: "${ 'binary_sensor.' + esp + '_movement' }"
          name: Mouvement
          icon: mdi:run-fast
          icon_color: >-
            ${ states['binary_sensor.' + esp + '_movement']?.state === 'on' ? 'orange' : 'disabled' }
        - type: custom:mushroom-entity-card
          entity: "${ 'binary_sensor.' + esp + '_still' }"
          name: Statique
          icon: mdi:human-male
          icon_color: >-
            ${ states['binary_sensor.' + esp + '_still']?.state === 'on' ? '#2E8B57' : 'disabled' }
        - type: custom:mushroom-entity-card
          entity: "${ 'sensor.' + esp + '_moving_distance_cm' }"
          name: Dist. Move
          icon: mdi:signal-distance-variant
        - type: custom:mushroom-entity-card
          entity: "${ 'sensor.' + esp + '_still_distance_cm' }"
          name: Dist. Still
          icon: mdi:ruler-square

  # =================================================================
  # 3. GRAPHES D'ÉNERGIE (Plotly Pro Style)
  # =================================================================
  - type: custom:tabbed-card
    tabs:
      - attributes:
          label: "⚡ Énergie Mouvement"
        card:
          type: custom:plotly-graph
          refresh_interval: 1
          ha_theme: true
          layout:
            height: 250
            margin: { l: 35, r: 15, t: 15, b: 35 }
            xaxis:
              type: linear
              dtick: 1
              range: [-0.5, 8.5]
              gridcolor: "RGBA(200,200,200,0.1)"
              title: "Gates (m)"
            yaxis:
              dtick: 20
              range: [0, 105]
              gridcolor: "RGBA(200,200,200,0.1)"
          entities:
            - entity: ""
              name: Seuil
              mode: lines
              line:
                color: "#FB239F"
                width: 2
                shape: hv
              x: [0, 1, 2, 3, 4, 5, 6, 7, 8]
              "y": |
                $fn ({hass}) => {
                  let esp = hass.states['input_select.liste_esp_ld2410']?.state || 'esp_salon';
                  return [0,1,2,3,4,5,6,7,8].map(i => Number(hass.states['number.'+esp+'_g'+i+'_move_threshold']?.state || 0));
                }
            - entity: ""
              name: Énergie
              type: bar
              marker:
                color: "RGBA(255, 165, 0, 0.4)"
              x: [0, 1, 2, 3, 4, 5, 6, 7, 8]
              "y": |
                $fn ({hass}) => {
                  let esp = hass.states['input_select.liste_esp_ld2410']?.state || 'esp_salon';
                  return [0,1,2,3,4,5,6,7,8].map(i => Number(hass.states['sensor.'+esp+'_g'+i+'_move_energy']?.state || 0));
                }

      - attributes:
          label: "❄️ Énergie Statique"
        card:
          type: custom:plotly-graph
          refresh_interval: 1
          ha_theme: true
          layout:
            height: 250
            margin: { l: 35, r: 15, t: 15, b: 35 }
            xaxis:
              type: linear
              dtick: 1
              range: [-0.5, 8.5]
              gridcolor: "RGBA(200,200,200,0.1)"
            yaxis:
              dtick: 20
              range: [0, 105]
              gridcolor: "RGBA(200,200,200,0.1)"
          entities:
            - entity: ""
              name: Seuil
              mode: lines
              line:
                color: "#FB239F"
                width: 2
                shape: hv
              x: [0, 1, 2, 3, 4, 5, 6, 7, 8]
              "y": |
                $fn ({hass}) => {
                  let esp = hass.states['input_select.liste_esp_ld2410']?.state || 'esp_salon';
                  return [0,1,2,3,4,5,6,7,8].map(i => Number(hass.states['number.'+esp+'_g'+i+'_still_threshold']?.state || 0));
                }
            - entity: ""
              name: Énergie
              type: bar
              marker:
                color: "RGBA(46, 139, 87, 0.4)"
              x: [0, 1, 2, 3, 4, 5, 6, 7, 8]
              "y": |
                $fn ({hass}) => {
                  let esp = hass.states['input_select.liste_esp_ld2410']?.state || 'esp_salon';
                  return [0,1,2,3,4,5,6,7,8].map(i => Number(hass.states['sensor.'+esp+'_g'+i+'_still_energy']?.state || 0));
                }

  # =================================================================
  # 4. RÉGLAGES EXPERTS (Structure Ultra-Réactive Mirror)
  # =================================================================
  - type: custom:tabbed-card
    tabs:
      # --- ONGLET MOVE ---
      - attributes:
          label: "Seuils MOVE"
        card:
          type: custom:config-template-card
          entities:
            - input_select.liste_esp_ld2410
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g0_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g1_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g2_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g3_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g4_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g5_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g6_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g7_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g8_move_threshold' : 'sun.sun' }
          variables:
            esp: >-
              states['input_select.liste_esp_ld2410'] ? states['input_select.liste_esp_ld2410'].state : 'esp_salon'
            res: >-
              parseFloat(states['select.' + (states['input_select.liste_esp_ld2410'] ? states['input_select.liste_esp_ld2410'].state : 'esp_salon') + '_distance_resolution']?.state || 0.75)
          card:
            type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g0_move_threshold' }"
                name: "G0 (0m)"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g1_move_threshold' }"
                name: "${ 'G1 (' + (1*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g2_move_threshold' }"
                name: "${ 'G2 (' + (2*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g3_move_threshold' }"
                name: "${ 'G3 (' + (3*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g4_move_threshold' }"
                name: "${ 'G4 (' + (4*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g5_move_threshold' }"
                name: "${ 'G5 (' + (5*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g6_move_threshold' }"
                name: "${ 'G6 (' + (6*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g7_move_threshold' }"
                name: "${ 'G7 (' + (7*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g8_move_threshold' }"
                name: "${ 'G8 (' + (8*res).toFixed(2) + 'm)' }"
                display_mode: buttons

      # --- ONGLET STILL ---
      - attributes:
          label: "Seuils STILL"
        card:
          type: custom:config-template-card
          entities:
            - input_select.liste_esp_ld2410
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g0_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g1_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g2_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g3_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g4_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g5_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g6_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g7_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_g8_still_threshold' : 'sun.sun' }
          variables:
            esp: >-
              states['input_select.liste_esp_ld2410'] ? states['input_select.liste_esp_ld2410'].state : 'esp_salon'
            res: >-
              parseFloat(states['select.' + (states['input_select.liste_esp_ld2410'] ? states['input_select.liste_esp_ld2410'].state : 'esp_salon') + '_distance_resolution']?.state || 0.75)
          card:
            type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g0_still_threshold' }"
                name: "G0 (0m)"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g1_still_threshold' }"
                name: "${ 'G1 (' + (1*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g2_still_threshold' }"
                name: "${ 'G2 (' + (2*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g3_still_threshold' }"
                name: "${ 'G3 (' + (3*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g4_still_threshold' }"
                name: "${ 'G4 (' + (4*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g5_still_threshold' }"
                name: "${ 'G5 (' + (5*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g6_still_threshold' }"
                name: "${ 'G6 (' + (6*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g7_still_threshold' }"
                name: "${ 'G7 (' + (7*res).toFixed(2) + 'm)' }"
                display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g8_still_threshold' }"
                name: "${ 'G8 (' + (8*res).toFixed(2) + 'm)' }"
                display_mode: buttons

      # --- ONGLET SYSTÈME ---
      - attributes:
          label: "Système"
        card:
          type: custom:config-template-card
          entities:
            - input_select.liste_esp_ld2410
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_timeout' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'switch.' + states['input_select.liste_esp_ld2410'].state + '_engineering_mode' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_max_move_distance_gate' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' + states['input_select.liste_esp_ld2410'].state + '_max_still_distance_gate' : 'sun.sun' }
          variables:
            esp: >-
              states['input_select.liste_esp_ld2410'] ? states['input_select.liste_esp_ld2410'].state : 'esp_salon'
          card:
            type: vertical-stack
            cards:
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: custom:mushroom-number-card
                    entity: "${ 'number.' + esp + '_max_move_distance_gate' }"
                    name: Portée Move
                    display_mode: buttons
                  - type: custom:mushroom-number-card
                    entity: "${ 'number.' + esp + '_max_still_distance_gate' }"
                    name: Portée Still
                    display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_timeout' }"
                name: Timeout Radar (Matériel)
                icon: mdi:timer-cog-outline
                display_mode: buttons
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: custom:mushroom-entity-card
                    entity: "${ 'switch.' + esp + '_engineering_mode' }"
                    name: Mode Ingénieur
                    icon_color: >-
                      ${ states['switch.' + esp + '_engineering_mode']?.state === 'on' ? '#2E8B57' : 'disabled' }
                    tap_action:
                      action: toggle
                  - type: custom:mushroom-entity-card
                    entity: "${ 'button.' + esp + '_query_params' }"
                    name: Rafraîchir
                    icon: mdi:sync
                    secondary_info: none
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: "${ 'button.' + esp + '_query_params' }"
                  - type: custom:mushroom-entity-card
                    entity: "${ 'button.' + esp + '_restart_ld' }"
                    name: Reboot Radar
                    icon: mdi:power-cycle
                    icon_color: red
                    secondary_info: none
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: "${ 'button.' + esp + '_restart_ld' }"
