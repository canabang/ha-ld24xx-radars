    cards:
      - type: custom:config-template-card
        entities:
          - input_select.liste_esp_ld2450
          - >-
            ${ states['input_select.liste_esp_ld2450'] ? 'number.' + states['input_select.liste_esp_ld2450'].state + '_radar_angle' : 'sun.sun' }
