                  - type: custom:mushroom-number-card
                    entity: ${ 'number.' + esp + '_radar_zone1_y' }
                    name: Distance Initiale (Y)
                  - type: custom:mushroom-number-card
                    entity: ${ 'number.' + esp + '_radar_zone1_width' }
                    name: Expansion Gauche (Largeur)
                  - type: custom:mushroom-number-card
