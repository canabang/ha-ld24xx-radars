                    name: Rester Actif (Sortie)
                    icon: mdi:account-cancel
                    icon_color: >-
                      ${ states['switch.' + esp + '_radar_target_must_leave_zone1']?.state === 'on' ? '#2E8B57' : 'disabled' }
