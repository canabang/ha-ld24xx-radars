# =================================================================
# 📡 PACKAGE LD2450 SALON (Version 3 Zones + 3 Exclusions)
# Basé sur la source Système et restauré pour 3 Zones completes
# Fichier : .ld2450.yaml (Local Salon)
# =================================================================

substitutions:
  # ==========================================
  #   RÉGLAGES DE PERFORMANCE & RAFRAÎCHISSEMENT
  # ==========================================
  # ---> MODE RÉGLAGE (Tracé fluide et rapide des bonshommes sur le Dashboard)
  # uart_throttle_ms: "250"
  #
  # ---> MODE PRODUCTION (Valeurs actuelles - Pour soulager le Wi-Fi de l'ESP)
  # uart_throttle_ms: "1500"
  # ==========================================

  uart_throttle_ms: "1500"
  distance_delta: "100.0"
  speed_delta: "0.2"

  # ==========================================
  #   RÉGLAGES DES ZONES (PAR DÉFAUT)
  # ==========================================
  # ZONE 1 : Bureau (PC)
  z1_x: "1.4"
  z1_y: "-0.5"
  z1_w: "2.25"
  z1_h: "2.3"
  z1_t: "4" # Timeout 4s

  # ZONE 2 : Canapé (Détente)
  z2_x: "-0.55"
  z2_y: "1.3"
  z2_w: "2.15"
  z2_h: "2.25"
  z2_t: "15" # Timeout 15s (Stabilisation Immobilité)

  # ZONE 3 : Salon Global (Enveloppe)
  z3_x: "4.0"
  z3_y: "-0.5"
  z3_w: "8.0"
  z3_h: "3.55"
  z3_t: "5" # Timeout 5s (Garde-fou)

  # EXCLUSION 1 : Zone Parasite
  ex1_x: "4.0"
  ex1_y: "3.15"
  ex1_w: "8.0"
  ex1_h: "4.9"
  ex1_t: "2"

esphome:
  comment: Human Presence Sensor by Zone (ESP32/LD2450) - SALON FULL
  platformio_options:
    board_build.flash_mode: dio
  project: 
    name: 53l3cu5.Human_Presence_Sensor_by_Zone
    version: "2.3.full.salon"
  on_boot:
    - priority: -200
      then:
        lambda: |-
          id(zone1_target_exist).publish_state(false);
          id(zone2_target_exist).publish_state(false);
          id(zone3_target_exist).publish_state(false);
          id(zone_ex1_target_exist).publish_state(false);
          id(zone_ex2_target_exist).publish_state(false);
          id(zone_ex3_target_exist).publish_state(false);
  includes:
    - zone.h

preferences:
    flash_write_interval: 60s
  
globals:
  - id: last_update_ld2450
    type: unsigned long
    restore_value: no
    initial_value: '0'
  - id: init_zone_publish
    type: bool
    restore_value: no
    initial_value: "false"

text_sensor:
  - platform: debug
    reset_reason:
      name: ${entity_name} ESP Reset Reason
      icon: mdi:anchor
      disabled_by_default: True
  - platform: template
    name: ${entity_name} Zone1 Info
    id: tips_zone1_conf
    icon: mdi:information-outline
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      char b[64]; sprintf(b, "(%.2f, %.2f) %.2fx%.2fm", id(zone1_x).state, id(zone1_y).state, id(zone1_width).state, id(zone1_height).state); return std::string(b);
  - platform: template
    name: ${entity_name} Zone2 Info
    id: tips_zone2_conf
    icon: mdi:information-outline
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      char b[64]; sprintf(b, "(%.2f, %.2f) %.2fx%.2fm", id(zone2_x).state, id(zone2_y).state, id(zone2_width).state, id(zone2_height).state); return std::string(b);
  - platform: template
    name: ${entity_name} Zone3 Info
    id: tips_zone3_conf
    icon: mdi:information-outline
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      char b[64]; sprintf(b, "(%.2f, %.2f) %.2fx%.2fm", id(zone3_x).state, id(zone3_y).state, id(zone3_width).state, id(zone3_height).state); return std::string(b);
  - platform: template
    name: ${entity_name} Zout1 Info
    id: tips_zone_ex1_conf
    icon: mdi:information-outline
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      char b[64]; sprintf(b, "(%.2f, %.2f) %.2fx%.2fm", id(zone_ex1_x).state, id(zone_ex1_y).state, id(zone_ex1_width).state, id(zone_ex1_height).state); return std::string(b);

