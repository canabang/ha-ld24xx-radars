    name: ${entity_name} Target Enable
    id: target_fn_enable
    optimistic: True
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    name: ${entity_name} Zone Enable
    id: zone_fn_enable
    optimistic: True
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    name: ${entity_name} Target must leave Zone1
    id: zone1_must_leave_enable
    optimistic: True
    icon: mdi:account-cancel
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    name: ${entity_name} Target must leave Zone2
    id: zone2_must_leave_enable
    optimistic: True
    icon: mdi:account-cancel
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    name: ${entity_name} Target must leave Zone3
    id: zone3_must_leave_enable
    optimistic: True
    icon: mdi:account-cancel
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template
    name: ${entity_name} Zout1 Enable
    id: zone_ex1_enable
    optimistic: True
    restore_mode: RESTORE_DEFAULT_ON

uart:
  id: uart_ld2450
  tx_pin:
    number: ${tx_pin_ld2450}
    mode:
      input: true
      pullup: true
  rx_pin:
    number: ${rx_pin_ld2450}
    mode:
      input: true
      pullup: true
  baud_rate: 256000
  parity: NONE
  stop_bits: 1
  data_bits: 8
  debug:
    direction: BOTH
    dummy_receiver: True
    after:
      delimiter: [0X55, 0XCC]
    sequence:
      - lambda: |-
          if ((millis() - id(last_update_ld2450)) <= ${uart_throttle_ms}) return;
          id(last_update_ld2450) = millis();

          static template_::TemplateNumber* z_x[] = {id(zone1_x), id(zone2_x), id(zone3_x)};
          static template_::TemplateNumber* z_y[] = {id(zone1_y), id(zone2_y), id(zone3_y)};
          static template_::TemplateNumber* z_h[] = {id(zone1_height), id(zone2_height), id(zone3_height)};
          static template_::TemplateNumber* z_w[] = {id(zone1_width), id(zone2_width), id(zone3_width)};
          static template_::TemplateBinarySensor* z_exist[] = {id(zone1_target_exist), id(zone2_target_exist), id(zone3_target_exist)};
          static template_::TemplateSensor* z_count[] = {id(zone1_target_count), id(zone2_target_count), id(zone3_target_count)};
          
          static template_::TemplateNumber* ex_x[] = {id(zone_ex1_x)};
          static template_::TemplateNumber* ex_y[] = {id(zone_ex1_y)};
          static template_::TemplateNumber* ex_h[] = {id(zone_ex1_height)};
          static template_::TemplateNumber* ex_w[] = {id(zone_ex1_width)};
          static template_::TemplateBinarySensor* ex_exist[] = {id(zone_ex1_target_exist)};
          static template_::TemplateSwitch* ex_enable[] = {id(zone_ex1_enable)};

          static template_::TemplateSensor* t_x[] = {id(target1_x), id(target2_x), id(target3_x)};
          static template_::TemplateSensor* t_y[] = {id(target1_y), id(target2_y), id(target3_y)};

          const int NUM_ZONES = 3;
          const int NUM_EX = 1;
          const int NUM_TARGETS = 3;
          float angle = id(wall_angle).state;

          struct Position p[NUM_TARGETS];
          struct Zone zd[NUM_ZONES];
          struct Zone ze[NUM_EX];

          int b = 0;
          for (int i = 0; i < NUM_TARGETS; i++) {
            p[i].x = (uint16_t((bytes[b+5] << 8) | bytes[b+4] ));
            if ((bytes[b+5] & 0x80) >> 7) p[i].x -= 32768; else p[i].x = 0 - p[i].x;
            p[i].x *= -1;
            p[i].y = (uint16_t((bytes[b+7] << 8) | bytes[b+6] ));
            if ((bytes[b+7] & 0x80) >> 7) p[i].y -= 32768; else p[i].y = 0 - p[i].y;
            p[i].valide = (p[i].x != 0 || p[i].y > 0);
            p[i].zone_ex_enter = false;
            b += 8;
          }

          for (int i = 0; i < NUM_EX; i++) {
            ze[i].x = ex_x[i]->state * 1000; ze[i].y = ex_y[i]->state * 1000; ze[i].width = ex_w[i]->state * 1000; ze[i].height = ex_h[i]->state * 1000;
            ze[i].target_count = 0;
            if (ex_enable[i]->state) {
              for (int j = 0; j < NUM_TARGETS; j++) {
                if (p[j].valide && check_targets_in_zone(ze[i], p[j], angle)) {
                  ze[i].target_count++; p[j].zone_ex_enter = true;
                }
              }
            }
            ex_exist[i]->publish_state(ze[i].target_count > 0);
          }

          static template_::TemplateSwitch* z_must_leave[] = {id(zone1_must_leave_enable), id(zone2_must_leave_enable), id(zone3_must_leave_enable)};
          
          int tc = 0;
          if (id(zone_fn_enable).state) {
            for (int i = 0; i < NUM_ZONES; i++) {
              zd[i].x = z_x[i]->state * 1000; zd[i].y = z_y[i]->state * 1000; zd[i].width = z_w[i]->state * 1000; zd[i].height = z_h[i]->state * 1000;
              zd[i].target_count = 0;
              zd[i].outside_target_count = 0;
              for (int j = 0; j < NUM_TARGETS; j++) {
                if (p[j].valide && !p[j].zone_ex_enter) {
                  if (check_targets_in_zone(zd[i], p[j], angle)) {
                    zd[i].target_count++;
                  } else {
                    zd[i].outside_target_count++;
                  }
                }
              }
              zd[i].has_target = (zd[i].target_count > 0);
              zd[i].has_target_outside = (zd[i].outside_target_count > 0);
              
              bool pub = true;
              if (z_must_leave[i]->state && !zd[i].has_target && !zd[i].has_target_outside) {
                // Feature "Target Must Leave Zone" : Si la cible disparaît du radar (statut inactif total), 
                // on annule la mise à jour pour forcer le maintien de l'état précédent dans la zone.
                pub = false;
              }
              
              if (pub) {
                z_count[i]->publish_state(zd[i].target_count);
                z_exist[i]->publish_state(zd[i].target_count > 0);
              }
            }
          }

          for (int i = 0; i < NUM_TARGETS; i++) {
            if (p[i].valide && !p[i].zone_ex_enter) tc++;
            if (id(target_fn_enable).state) {
              t_x[i]->publish_state(p[i].valide ? p[i].x / 1000.0 : NAN);
              t_y[i]->publish_state(p[i].valide ? p[i].y / 1000.0 : NAN);
            }
          }
          id(all_target_count).publish_state(tc);
          id(any_target_exist).publish_state(tc > 0);
          if (!id(init_zone_publish)) id(init_zone_publish) = true;

button:
  - platform: restart
    icon: mdi:power-cycle
    name: ${entity_name} ESP Reboot
    entity_category: diagnostic

